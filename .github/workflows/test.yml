name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: package tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: defense-beacon — canary-match hook tests
        run: bash defense-beacon/reference/tests/canary_match_test.sh

      - name: defense-beacon — make-canaries unit tests
        run: python3 defense-beacon/reference/tests/make_canaries_test.py

      - name: trust-zones — apply-mcp-scopes preflight tests
        run: bash trust-zones/reference/tests/apply_mcp_scopes_test.sh

      - name: tools — status-segment unit tests
        run: python3 tools/tests/status_segment_test.py

      - name: white-cells — Phase 1 unit tests
        run: python3 experiments/white-cells/tests/test_white_cells.py

      - name: white-cells — Phase 2/3 unit + e2e tests
        run: python3 experiments/white-cells/tests/test_white_cells_phase_2_3.py
